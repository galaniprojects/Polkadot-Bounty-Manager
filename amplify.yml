version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cp .env.example .env
        - npm ci --cache .npm --prefer-offline

    build:
      commands:
        - npm run build

    postBuild:
      commands:
        - mv build out
        - mkdir -p build
        - mv out/deploy-manifest.json build/
        - mv out build/static

  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
